name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  luacheck:
    name: LuaCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run LuaCheck gate
        uses: ./.github/actions/luacheck-gate
        with:
          lua-version: "5.1"
          targets: "_meta.lua main.lua common config modules"

  release:
    name: Build & Release
    needs: luacheck
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from _meta.lua
        id: meta
        run: |
          VERSION=$(grep -oP '(?<=version = ")[^"]+' _meta.lua)
          if [[ -z "$VERSION" ]]; then
            echo "Error: could not extract version from _meta.lua" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version is new
        id: version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.meta.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install fonttools
        if: steps.version_check.outputs.skip == 'false'
        run: pip install fonttools

      - name: Build plugin zip
        if: steps.version_check.outputs.skip == 'false'
        run: bash build.sh

      - name: Build release notes
        if: steps.version_check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          python3 .github/scripts/build_release_notes.py "$VERSION" > release_notes.md

      - name: Create release
        if: steps.version_check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.meta.outputs.version }}"
          gh release create "$TAG" \
            dist/zen_ui.koplugin.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "Zen UI $TAG" \
            --notes-file release_notes.md
